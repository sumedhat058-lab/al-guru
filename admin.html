<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A/L Guru - Admin Panel</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: white; padding: 20px; text-align: center; }
        .box { background: #1e293b; padding: 25px; border-radius: 12px; max-width: 450px; margin: 40px auto; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        h2, h3 { color: #38bdf8; margin-bottom: 20px; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { background: #2563eb; color: white; cursor: pointer; font-weight: bold; border: none; transition: 0.2s; }
        button:hover { background: #1d4ed8; }
        #adminForm { display: none; }
        textarea { width: 100%; height: 120px; margin-top: 15px; background: #000; color: #00ff00; border-radius: 6px; font-family: monospace; padding: 10px; box-sizing: border-box; }
        .hint { font-size: 12px; color: #94a3b8; text-align: left; margin-top: 5px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>

<div class="box">
    <h2>A/L Guru Admin Login</h2>
    <div id="loginBox">
        <input type="password" id="passwordInput" placeholder="මුරපදය (Password) ඇතුලත් කරන්න">
        <button onclick="checkPassword()">ලොග් වන්න (Log In)</button>
    </div>

    <div id="adminForm">
        <h3>නව දත්ත ඇතුලත් කිරීම</h3>
        
        <label style="display:block; text-align:left;">විෂය (Subject):</label>
        <select id="subject">
            <option value="Accounting">Accounting (ගිණුම්කරණය)</option>
            <option value="Agricultural Science">Agricultural Science (කෘෂි විද්‍යාව)</option>
            <option value="Agro Technology">Agro Technology (කෘෂි ">Agro Technology (කෘෂි තාක්ෂණය)</option>
        </select>

        <label style="display:block; text-align:left; margin-top:10px;">භාෂාව (Language):</label>
        <select id="lang">
            <option value="Sinhala">Sinhala</option>
            <option value="Tamil">Tamil</option>
            <option value="English">English</option>
        </select>

        <label style="display:block; text-align:left; margin-top:10px;">Google Drive Link:</label>
        <input type="text" id="driveLink" placeholder="https://drive.google.com/...">
        
        <button onclick="generateJsonRow()">JSON කෝඩ් එක සාදන්න</button>
        
        <h4 style="margin-top:20px; text-align:left; color:#94a3b8;">පහත කෝඩ් එක පිටපත් (Copy) කරගන්න:</h4>
        <textarea id="output" readonly></textarea>
        <p class="hint">*මෙහි ලැබෙන කෝඩ් එක Copy කර ඔයාගේ papers.json හෝ notes.json ෆයිල් එක ඇතුලට දමා සේව් කරන්න.</p>
    </div>
</div>

<script>
const correctHash = "594273235f4f475cdaa4474c3f7481956f9ac0cc6ab386dd84d9b1628ca388e4"; 

function checkPassword() {
    const input = document.getElementById("passwordInput").value;
    const inputHash = CryptoJS.SHA256(input).toString();

    if (inputHash === correctHash) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("adminForm").style.display = "block";
    } else {
        alert("වැරදි මුරපදයක්! නැවත උත්සාහ කරන්න.");
    }
}

function generateJsonRow() {
    const subject = document.getElementById("subject").value;
    const lang = document.getElementById("lang").value;
    const link = document.getElementById("driveLink").value;

    if(!link) {
        alert("කරුණාකර Google Drive ලින්ක් එකක් ඇතුලත් කරන්න!");
        return;
    }

    const jsonFormat = `,{\n  "subject": "${subject}",\n  "language": "${lang}",\n  "link": "${link}"\n}`;
    document.getElementById("output").value = jsonFormat;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<title>A/L Guru Admin</title>
<style>
body{background:#0f172a;color:white;font-family:sans-serif;padding:20px}
.login, .panel{max-width:500px;margin:auto;background:#1e293b;padding:20px;border-radius:10px}
input,button,select{width:100%;padding:10px;margin:10px 0;border-radius:5px;border:none}
button{background:#3b82f6;color:white;cursor:pointer}
.hidden{display:none}
</style>
</head>
<body>

<div class="login" id="loginBox">
  <h2>🔒 Admin Login</h2>
  <input type="password" id="pass" placeholder="Password එක දාන්න">
  <button onclick="login()">Login</button>
</div>

<div class="panel hidden" id="panelBox">
  <h2>📄 Paper Upload Panel</h2>
  <input type="text" id="subject" placeholder="Subject එක - උදා: Physics">
  <input type="text" id="year" placeholder="Year - උදා: 2023">
  <input type="text" id="link" placeholder="Google Drive Link එක">
  <button onclick="addPaper()">Add Paper</button>
  <hr>
  <h3>Saved Papers:</h3>
  <div id="list"></div>
  <button onclick="exportData()">📋 Export Code</button>
  <button onclick="logout()">Logout</button>
</div>

<script>
const ADMIN_PASS = "alGuru2026"; // මේක උඹට ඕන Password එකට මාරු කරන්න
let papers = JSON.parse(localStorage.getItem('papers')) || [];

function login(){
  if(document.getElementById('pass').value === ADMIN_PASS){
    document.getElementById('loginBox').classList.add('hidden');
    document.getElementById('panelBox').classList.remove('hidden');
    showPapers();
  } else {alert("වැරදි Password එකක්!")}
}

function logout(){
  document.getElementById('loginBox').classList.remove('hidden');
  document.getElementById('panelBox').classList.add('hidden');
}

function addPaper(){
  let s=document.getElementById('subject').value;
  let y=document.getElementById('year').value;
  let l=document.getElementById('link').value;
  papers.push({subject:s,year:y,link:l});
  localStorage.setItem('papers', JSON.stringify(papers));
  alert("Save උනා!");
  showPapers();
}

function showPapers(){
  document.getElementById('list').innerHTML = papers.map(p=>`<p>${p.subject} - ${p.year}</p>`).join('');
}

function exportData(){
  prompt("මේ Code එක Copy කරලා JS file එකට දාන්න:", JSON.stringify(papers));
}
</script>
</body>
</html>

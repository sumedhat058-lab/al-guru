<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subject - A/L Guru</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #fff; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #1e3a8a, #3b82f6); padding: 1.5rem; text-align: center; position: sticky; top: 0; z-index: 10; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .back { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: white; text-decoration: none; font-size: 1.5rem; }
        .header h1 { font-size: 1.8rem; }
        .header p { opacity: 0.8; font-size: 0.9rem; margin-top: 0.3rem; }
        .container { max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
        .subtitle { text-align: center; font-size: 1.3rem; margin-bottom: 2rem; opacity: 0.9; }
        .medium-btn { background: #1e293b; border: 2px solid #334155; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; cursor: pointer; transition: all 0.3s; text-align: center; font-size: 1.2rem; font-weight: 600; }
        .medium-btn:hover { transform: translateY(-3px); border-color: #3b82f6; box-shadow: 0 8px 25px rgba(59, 130, 246, 0.3); }
        .medium-btn.sinhala { border-color: #f59e0b; }
        .medium-btn.sinhala:hover { background: #f59e0b; color: #0f172a; }
        .medium-btn.tamil { border-color: #10b981; }
        .medium-btn.tamil:hover { background: #10b981; color: #0f172a; }
        .medium-btn.english { border-color: #8b5cf6; }
        .medium-btn.english:hover { background: #8b5cf6; color: #0f172a; }
    </style>
</head>
<body>
    <div class="header">
        <a href="papers.html" class="back">←</a>
        <h1 id="subjectName">Loading...</h1>
        <p id="subjectSinhala"></p>
    </div>
    <div class="container">
        <div class="subtitle">භාෂාව තෝරන්න</div>
        <div class="medium-btn sinhala" onclick="selectMedium('සිංහල')">1. සිංහල</div>
        <div class="medium-btn tamil" onclick="selectMedium('දෙමළ')">2. දෙමළ</div>
        <div class="medium-btn english" onclick="selectMedium('ඉංග්‍රීසි')">3. ඉංග්‍රීසි</div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const subject = urlParams.get('subject');
        const sinhala = urlParams.get('sinhala');
        document.getElementById('subjectName').textContent = subject || 'Subject';
        document.getElementById('subjectSinhala').textContent = sinhala || '';
        document.title = subject + ' - A/L Guru';
        function selectMedium(medium) {
            alert(subject + ' - ' + medium + ' Medium\n\nPapers ඉක්මනට එකතු කරනවා!');
        }
    </script>
</body>
</html>

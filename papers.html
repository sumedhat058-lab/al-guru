        const grid = document.getElementById('subjectsGrid');
        const searchInput = document.getElementById('searchInput');
        const noResults = document.getElementById('noResults');
        const stats = document.getElementById('stats');
        const tabs = document.querySelectorAll('.tab');
        let currentFilter = 'all';

        function renderSubjects(list) {
            grid.innerHTML = '';
            stats.textContent = `මුළු විෂයන්: ${list.length}`;
            if (list.length === 0) { noResults.style.display = 'block'; return; }
            noResults.style.display = 'none';
            list.forEach(sub => {
                const card = document.createElement('div');
                card.className = 'subject-card';
                card.onclick = function() { 
                    alert(sub.name + ' - ' + sub.sinhala + ' - Coming Soon!');
                };
                const mediumBadges = sub.mediums.map(m => `<span class="medium-badge">${m}</span>`).join('');
                card.innerHTML = `<h3>${sub.name}</h3><p>${sub.sinhala}</p><div class="mediums">${mediumBadges}</div><span class="stream-badge">${sub.stream}</span>`;
                grid.appendChild(card);
            });
        }

        function filterAndRender() {
            const query = searchInput.value.toLowerCase();
            let filtered = subjects.filter(s => s.name.toLowerCase().includes(query) || s.sinhala.includes(query));
            if (currentFilter !== 'all') {
                filtered = filtered.filter(s => s.stream.includes(currentFilter));
            }
            renderSubjects(filtered);
        }

        searchInput.addEventListener('input', filterAndRender);
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentFilter = tab.dataset.filter;
                filterAndRender();
            });
        });
        renderSubjects(subjects);
